<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Remote AutoCSS UI styles, loaded as a resource from https://autocss.com
         (order = the @layer cascade; mirrors autocss/index.html). themes.css and
         transitions.css are intentionally commented out in AutoCSS itself. -->
    <link rel="stylesheet" href="https://autocss.com/assets/css/reset.css" />
    <link rel="stylesheet" href="https://autocss.com/assets/css/fonts.css" />
    <link rel="stylesheet" href="https://autocss.com/assets/css/color-scheme.css" />
    <link rel="stylesheet" href="https://autocss.com/assets/css/color-theme-66ccff.css" />
    <!-- <link rel="stylesheet" href="https://autocss.com/assets/css/themes.css" /> -->
    <link rel="stylesheet" href="https://autocss.com/assets/css/layout.css" />
    <!-- <link rel="stylesheet" href="https://autocss.com/assets/css/transitions.css" /> -->
    <link rel="stylesheet" href="https://autocss.com/assets/css/inputs.css" />
    <link rel="stylesheet" href="https://autocss.com/assets/css/media.css" />
    <link rel="stylesheet" href="https://autocss.com/assets/css/typography.css" />
    <link rel="stylesheet" href="https://autocss.com/assets/css/scrolling.css" />
    <link rel="stylesheet" href="https://autocss.com/assets/css/a11y.css" />
    <link rel="stylesheet" href="https://autocss.com/assets/css/forms.css" />
    <link rel="stylesheet" href="https://autocss.com/assets/css/fallbacks.css" />
    <link rel="stylesheet" href="https://autocss.com/assets/css/loading.css" />

    <title>AutoCSS demo &mdash; React data layer</title>
  </head>

  <!--
    The AutoCSS Holy-Grail scaffold (app-container down to <article>) is STATIC
    here. The React app is a DATA LAYER only — it renders no presentation and
    claims no DOM node; AutoCSS owns all rendering. See src/App.jsx.
  -->
  <body>
    <app-container>
      <app-banner></app-banner>
      <header>
        <app-logo></app-logo>
        <label>
          Layouts
          <input type="checkbox" checked />
        </label>
        <label aria-label="Light color scheme">
          &#9788; Light
          <input type="radio" aria-hidden="true" name="color-scheme" value="light" />
        </label>
        <label aria-label="Dark color scheme">
          &#9790; Dark
          <input type="radio" aria-hidden="true" name="color-scheme" value="dark" />
        </label>
        <label aria-label="System color scheme">
          &#9680; System
          <input type="radio" aria-hidden="true" name="color-scheme" value="system" checked />
        </label>
      </header>
      <nav>
        <details open>
          <summary></summary>
          <section>
            <label><input type="radio" aria-hidden="true" name="nav" value="manage" /></label>
            <label><input type="radio" aria-hidden="true" name="nav" value="faqs" /></label>
          </section>
        </details>
        <details open>
          <summary></summary>
          <section>
            <label><input type="radio" aria-hidden="true" name="nav" value="api-registration" /></label>
            <label><input type="radio" aria-hidden="true" name="nav" value="audit" /></label>
            <label><input type="radio" aria-hidden="true" name="nav" value="option-set" /></label>
            <label><input type="radio" aria-hidden="true" name="nav" value="option-types" /></label>
            <label><input type="radio" aria-hidden="true" name="nav" value="scope-type" /></label>
            <label><input type="radio" aria-hidden="true" name="nav" value="server-types" /></label>
            <label><input type="radio" aria-hidden="true" name="nav" value="servers" /></label>
            <label><input type="radio" aria-hidden="true" name="nav" value="credentials" /></label>
            <label><input type="radio" aria-hidden="true" name="nav" value="variables" /></label>
            <label><input type="radio" aria-hidden="true" name="nav" value="settings" /></label>
          </section>
        </details>
      </nav>
      <main>
        <article></article>
      </main>
      <aside>
        <h2 aria-live="polite">DETAILS</h2>
        <label role="button" aria-label="Close">
          <input type="checkbox" />
          &#10006;
        </label>
        <form>
          <fieldset></fieldset>
          <p aria-live="polite"></p>
          <small>Note: Ensure all fields are filled correctly before submitting.</small>
          <small>Note: All fields marked with * are required.</small>
          <label role="button" aria-label="Delete">
            Delete
            <input type="checkbox" />
          </label>
          <label role="button" aria-label="Reset">
            Reset
            <input type="checkbox" />
          </label>
          <label role="button" aria-label="Save">
            Save
            <input type="checkbox" />
          </label>
        </form>
      </aside>
      <footer>
        <app-legal></app-legal>
        <app-version></app-version>
      </footer>
      <app-banner></app-banner>
    </app-container>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
